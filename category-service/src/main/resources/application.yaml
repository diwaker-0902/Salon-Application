server:
  port: 5003

spring:
  application:
    name: category-service

  datasource:
    url: jdbc:mysql://localhost:3306/salon_category_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect